---
layout: default
---
<div class="mx-auto max-w-4xl px-6 py-12 lg:py-16">
  <header class="border-b border-border pb-8">
    <h1>
      {% if page.visible_title %}{{ page.visible_title }}{% else %}{{ page.title }}{% endif %}
    </h1>
    {% if page.headline %}
    <p class="mt-3 text-lg leading-relaxed text-content-muted">{{ page.headline }}</p>
    {% endif %}
  </header>
  <article class="prose mt-8 max-w-none">
    {{ content }}
  </article>
</div>
